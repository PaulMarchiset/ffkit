name: Release

# Build, sign, and publish a Tauri release whenever a version tag is pushed.
# The job creates a GitHub Release, uploads the Windows installer(s), and
# generates the `latest.json` that the in-app updater polls.
on:
  push:
    tags:
      - "v*"

# tauri-action needs to create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Not `npm ci`: @tailwindcss/oxide-wasm32-wasi bundles @emnapi/* optional
      # deps that npm prunes from the lockfile on win32, so `npm ci`'s strict
      # in-sync check spuriously fails. `npm install` tolerates the gap.
      - name: Install frontend dependencies
        run: npm install

      # ffmpeg/ffprobe are bundled as sidecars but gitignored (see README),
      # so fetch the GPL build and drop them in with the target-triple names
      # that tauri.conf.json's externalBin expects.
      - name: Download ffmpeg/ffprobe sidecars
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg-archive
          7z x ffmpeg-archive -o.
          cp "ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe" "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
          cp "ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe" "src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe"

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Use the pushed tag (e.g. v1.2.0) as the release tag/name.
          tagName: ${{ github.ref_name }}
          releaseName: "FFkit ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          # Emit latest.json so the updater endpoint resolves.
          includeUpdaterJson: true
